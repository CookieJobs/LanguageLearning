version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: linguacraft-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: linguacraft

  redis:
    image: redis:7-alpine
    container_name: linguacraft-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: linguacraft-backend
    restart: unless-stopped
    ports:
      - "5500:5500"
    environment:
      API_PORT: 5500
      MONGO_URL: mongodb://mongodb:27017/linguacraft
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: deepseek-chat
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    container_name: linguacraft-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
