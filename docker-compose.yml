# input: 无
# output: 无
# pos: 系统/通用
# 若我被更新，请同步更新我的开头注释，以及所属的文件夹的 README。
version: "3.9"
services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
  mongo-express:
    image: mongo-express:1.0
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017
    ports:
      - "8081:8081"
    depends_on:
      - mongo
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  backend:
    build: ./backend
    command: sh -c "npm install && npm run dev"
    environment:
      - API_PORT=5500
      - MONGO_URL=mongodb://mongo:27017/linguacraft
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=change_me
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=deepseek-chat
    ports:
      - "5500:5500"
    depends_on:
      - mongo
      - redis
volumes:
  mongodata:
