<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaCraft AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f0f5ff',
                100: '#e0eaff',
                200: '#c7d7fe',
                300: '#a4bcfd',
                400: '#7b9cfa',
                500: '#5b7cf5',
                600: '#4361ee',
                700: '#3651d4',
                800: '#2d43ab',
                900: '#2a3b87',
              },
              accent: {
                50: '#fdf4ff',
                100: '#fae8ff',
                200: '#f5d0fe',
                300: '#f0abfc',
                400: '#e879f9',
                500: '#d946ef',
                600: '#c026d3',
                700: '#a21caf',
                800: '#86198f',
                900: '#701a75',
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out',
              'fade-in-up': 'fadeInUp 0.5s ease-out',
              'slide-up': 'slideUp 0.4s ease-out',
              'scale-in': 'scaleIn 0.3s ease-out',
              'bounce-subtle': 'bounceSubtle 2s infinite',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 2s infinite linear',
              'glow': 'glow 2s ease-in-out infinite alternate',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(16px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              scaleIn: {
                '0%': { transform: 'scale(0.95)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              bounceSubtle: {
                '0%, 100%': { transform: 'translateY(-2px)' },
                '50%': { transform: 'translateY(2px)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              glow: {
                '0%': { boxShadow: '0 0 20px rgba(91, 124, 245, 0.3)' },
                '100%': { boxShadow: '0 0 30px rgba(91, 124, 245, 0.5)' },
              }
            },
            boxShadow: {
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
              'glass-lg': '0 16px 48px 0 rgba(31, 38, 135, 0.1)',
              'glow-brand': '0 0 24px rgba(91, 124, 245, 0.25)',
              'glow-emerald': '0 0 24px rgba(16, 185, 129, 0.25)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }
      body { 
        font-family: 'Inter', system-ui, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
        min-height: 100vh;
      }
      
      /* Glass Effects */
      .glass {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 
          0 4px 6px -1px rgba(0, 0, 0, 0.03),
          0 10px 20px -2px rgba(0, 0, 0, 0.04),
          inset 0 1px 0 rgba(255, 255, 255, 1);
      }
      
      .glass-card:hover {
        box-shadow: 
          0 8px 16px -4px rgba(0, 0, 0, 0.06),
          0 20px 40px -8px rgba(0, 0, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 1);
      }
      
      /* Gradient Border Effect */
      .gradient-border {
        position: relative;
        background: white;
      }
      .gradient-border::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(91, 124, 245, 0.3), rgba(217, 70, 239, 0.3));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { 
        background: linear-gradient(180deg, #c7d7fe 0%, #a4bcfd 100%);
        border-radius: 3px; 
      }
      ::-webkit-scrollbar-thumb:hover { 
        background: linear-gradient(180deg, #a4bcfd 0%, #7b9cfa 100%);
      }
      
      /* Custom Scrollbar Firefox */
      * { scrollbar-width: thin; scrollbar-color: #c7d7fe transparent; }
      
      /* Smooth transitions */
      .transition-smooth { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>

    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
