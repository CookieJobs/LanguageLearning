<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaCraft AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
                400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
                800: '#1e40af', 900: '#1e3a8a',
              },
              'duo-blue': '#4f46e5',
              'duo-blue-dark': '#4338ca',
              'duo-yellow': '#fbbf24',
              'duo-green': '#10b981',
              'duo-green-dark': '#059669',
              'duo-orange': '#f97316',
              'duo-red': '#ef4444',
              'duo-red-dark': '#dc2626',
            },
          },
        },
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      body { font-family: 'Inter', sans-serif; }
      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fade-in 0.5s ease-out; }
      @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      .animate-scale-in { animation: scale-in 0.4s ease-out; }
      @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-up { animation: fade-in-up 0.6s ease-out; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1); opacity: 0.3; } 100% { transform: scale(1.2); opacity: 0; } }
      .animate-pulse-ring { animation: pulse-ring 1.5s ease-out infinite; }
      .line-clamp-1 { overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 1; }
      .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
    </style>
    <!-- Force Tailwind CDN to detect our custom color classes used in React components -->
    <div class="hidden bg-duo-blue bg-duo-blue-dark bg-duo-yellow bg-duo-green bg-duo-green-dark bg-duo-orange bg-duo-red bg-duo-red-dark text-duo-blue text-duo-blue-dark text-duo-yellow text-duo-green text-duo-green-dark border-duo-blue border-duo-blue-dark border-duo-green border-duo-green-dark border-duo-red border-duo-red-dark ring-duo-blue ring-duo-green ring-duo-red hover:bg-duo-green hover:bg-duo-blue focus-visible:ring-duo-blue focus-visible:ring-duo-green focus-visible:ring-duo-red"></div>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
