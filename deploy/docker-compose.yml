# input: 无
# output: 无
# pos: 部署/配置
# 若我被更新，请同步更新我的开头注释，以及所属的文件夹的 README。
version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/backend/Dockerfile
    environment:
      - API_PORT=5500
      - DATABASE_URL=file:/data/dev.db
      - JWT_SECRET=${JWT_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
    volumes:
      - backend-data:/data
    expose:
      - "5500"
  web:
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
      # Uncomment after you provision TLS certs and mount them in nginx.conf
      # - "443:443"
volumes:
  backend-data:
